<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Contactenos</title>
 <link rel="stylesheet" href="contactUs.css">
 		<link rel="alternate" hreflang="en" href="https://chrisdominguez79.github.io/LawfirmPractice/contactUs.html">
		<link rel="alternate" hreflang="es" href="https://chrisdominguez79.github.io/LawfirmPractice/es/contactUs.html">
		<link rel="alternate" hreflang="x-default" href="https://chrisdominguez79.github.io/LawfirmPractice/contactUs.html">
</head>
<body>

<div class="form-wrapper">
<form class ="form" action="https://formspree.io/f/xlgwnakp" method="POST">
    <h2>Contáctenos</h2>
  <input type="text" name="name" placeholder="Nombre Completo" required>
  
  <input type="email" name="email" placeholder="Correo electrónico" required>
  <input type="tel" id="phone" name="phone" placeholder="Número de teléfono" required>
  <textarea name="message" placeholder="Mensaje" required></textarea>
  
  <button type="submit">Enviar mensaje</button>
</form>
</div>

<script>
document.getElementById("phone").addEventListener("input", function (e) {
  let input = e.target.value.replace(/\D/g, "");
  if (input.length > 10) input = input.slice(0, 10);

  let formatted = input;
  if (input.length > 6) {
    formatted = `(${input.slice(0,3)}) ${input.slice(3,6)}-${input.slice(6)}`;
  } else if (input.length > 3) {
    formatted = `(${input.slice(0,3)}) ${input.slice(3)}`;
  }

  e.target.value = formatted;
});
</script>


</body>

</html>
